<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRETBOARD VISUALIZATION SYSTEM - MULTI POSITIONS</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --accent-purple: #bc8cff;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            
            /* スケール別カラー */
            --color-major: #3fb950;
            --color-mms: #ff7b72;
            --color-mpenta: #58a6ff;
            --color-minpenta: #f2c744;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* ヘッダーのレイアウトを元のシンプルな形に戻す */
        header {
            border-bottom: 2px solid var(--accent-purple);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        h1 { color: var(--accent-purple); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        /* PROGRESSION RADAR と完全に統一した戻るリンクのスタイル */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent-purple); /* スケールのテーマカラーに合わせる場合はここ */
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        .control-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .position-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .pos-btn {
            background-color: #21262d;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 5px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.15s ease;
        }
        .pos-btn.active {
            background: rgba(188, 140, 255, 0.15);
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            box-shadow: 0 0 10px rgba(188, 140, 255, 0.3);
        }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .layer-btn {
            background-color: #21262d;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 12px 5px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 0.85rem;
            transition: all 0.15s ease;
        }

        .layer-btn#btn-major_scale.active { background: rgba(63, 185, 80, 0.15); border-color: var(--color-major); color: var(--color-major); }
        .layer-btn#btn-melodic_minor.active { background: rgba(255, 123, 114, 0.15); border-color: var(--color-mms); color: var(--color-mms); }
        .layer-btn#btn-major_penta.active { background: rgba(88, 166, 255, 0.15); border-color: var(--color-mpenta); color: var(--color-mpenta); }
        .layer-btn#btn-minor_penta.active { background: rgba(242, 199, 68, 0.15); border-color: var(--color-minpenta); color: var(--color-minpenta); }

        .chord-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .chord-btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 0;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .chord-btn:hover { color: #fff; border-color: #8b949e; }
        .chord-btn.active {
            background-color: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .fretboard-container {
            background: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            overflow-x: auto;
        }

        .fretboard { display: flex; flex-direction: column; width: 100%; min-width: 600px; }

        .string {
            height: 60px;
            display: flex;
            align-items: center;
            position: relative;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }
        .string::before {
            content: ""; position: absolute; left: 0; right: 0; top: 29px;
            height: 2px; background: #484f58; z-index: 1; opacity: 0.5;
        }

        .fret {
            flex: 1;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-right: 4px solid #21262d;
        }
        .fret-0 { border-left: 5px solid #8b949e; }

        .note {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; font-weight: 800; color: transparent;
            background-color: transparent; 
            display: none; 
            z-index: 10;
            transition: all 0.12s ease-in-out;
        }
        
        .note.major_scale { border: 2.5px solid var(--color-major); box-shadow: 0 0 8px rgba(63, 185, 80, 0.4); }
        .note.melodic_minor { border: 2.5px solid var(--color-mms); box-shadow: 0 0 8px rgba(255, 123, 114, 0.4); }
        .note.major_penta { border: 2.5px solid var(--color-mpenta); box-shadow: 0 0 8px rgba(88, 166, 255, 0.4); }
        .note.minor_penta { border: 2.5px solid var(--color-minpenta); box-shadow: 0 0 8px rgba(242, 199, 68, 0.4); }

        .note.scale-overlap {
            border: 4px solid #ffffff !important;
            box-shadow: 0 0 12px rgba(188, 140, 255, 0.8);
            transform: scale(1.05);
        }

        .note.chord-on {
            color: #ffffff !important;
            font-family: 'Arial Black', sans-serif;
            transform: scale(1.15);
            box-shadow: 0 0 20px #fff;
            border: 2px solid #fff !important;
            animation: pulse 1.5s infinite alternate;
        }
        
        .note.chord-root {
            background-color: #ffffff !important;
            color: #0d1117 !important;
            border: 3px solid var(--accent-purple) !important;
            font-size: 0.85rem;
            font-weight: 900;
        }

        .fretboard.dim-mode .note:not(.chord-on) {
            opacity: 0.15;
            transform: scale(0.8);
            box-shadow: none;
        }

        .fret-labels { display: flex; width: 100%; min-width: 600px; margin-top: 15px; }
        .fret-label { flex: 1; text-align: center; font-size: 0.8rem; color: var(--text-muted); font-family: monospace; font-weight: bold; }

        @keyframes pulse {
            from { box-shadow: 0 0 10px rgba(255,255,255,0.4); }
            to { box-shadow: 0 0 22px rgba(255,255,255,0.9); }
        }
    </style>
</head>

<div class="container">
    <header>

        <div class="subtitle">MODEL MULTI-POSITIONS // オール・ネオンエッジUI</div>
    </header>

    <div class="control-panel">

            <button id="btn-pos3" class="pos-btn" onclick="changePosition('position3')">Position 3</button>

        </div>

            <button id="btn-major_scale" class="layer-btn active" onclick="toggleLayer('major_scale')">Major Scale</button>

            <button id="btn-major_penta" class="layer-btn" onclick="toggleLayer('major_penta')">Major Penta</button>
            <button id="btn-minor_penta" class="layer-btn" onclick="toggleLayer('minor_penta')">Minor Penta</button>
        </div>

        <div class="section-title">2. Diatonic Chord Tones (選択するとコード構成音とルート「R」が浮かび上がります)</div>
        <div class="chord-grid">
            <button class="chord-btn" onclick="toggleChord('IM7')">ⅠM7</button>
            <button class="chord-btn" onclick="toggleChord('IIm7')">Ⅱm7</button>
            <button class="chord-btn" onclick="toggleChord('IIIm7')">Ⅲm7</button>

            <button class="chord-btn" onclick="toggleChord('V7')">Ⅴ7</button>
            <button class="chord-btn" onclick="toggleChord('VIm7')">Ⅵm7</button>
            <button class="chord-btn" onclick="toggleChord('VIIm7b5')">Ⅶm7♭5</button>
        </div>
    </div>

    <div class="fretboard-container">
        <div class="fretboard" id="fretboardGrid"></div>
        <div class="fret-labels" id="fretLabels"></div>
    </div>

    <!-- 最下部に PROGRESSION RADAR と同じテキストリンクを配置 -->
    <a href="index.html" class="back-link">← メインメニューに戻る</a>
</div>

                IIIm7: [[null, '◎', '・', null, '〇'], [null, '〇', '・', null, '〇'], [null, '〇', null, '・', null], [null, '〇', null, '◎', '・'], [null, '・', '〇', '・', '〇'], [null, '◎', '・', null, '〇']],
                IVM7: [[null, '〇', '◎', null, '・'], [null, '・', '〇', null, '・'], [null, '・', null, '〇', null], [null, '・', null, '〇', '◎'], [null, '〇', null, '・', '〇'], [null, '〇', '◎', null, '・']],
                V7: [[null, '・', '〇', null, '◎'], [null, '〇', '・', null, '〇'], [null, '◎', null, '・', null], [null, '〇', null, '・', '〇'], [null, '・', '〇', '・', '〇'], [null, '・', '〇', null, '◎']],
                VIm7: [[null, '〇', '・', null, '〇'], [null, '・', '〇', null, '・'], [null, '〇', null, '◎', null], [null, '・', '〇', '・', '〇'], [null, '◎', null, '・', '〇'], [null, '〇', '・', null, '〇']],
                VIIm7b5: [[null, '・', '〇', null, '・'], [null, '◎', '・', null, '〇'], [null, '・', null, '〇', null], [null, '〇', null, '・', '〇'], [null, '〇', null, '◎', '・'], [null, '・', '〇', null, '・']]
            }
        }
    };

    function buildFretboard() {
        const board = document.getElementById('fretboardGrid');
        const labels = document.getElementById('fretLabels');
        board.innerHTML = '';
        labels.innerHTML = '';

        if (selectedChord) {
            board.classList.add('dim-mode');
        } else {
            board.classList.remove('dim-mode');
        }

        const labelTexts = ["ポジション開始", "+1 Fret", "+2 Fret", "+3 Fret", "+4 Fret"];
        for (let f = 0; f < 5; f++) {
            const lbl = document.createElement('div');
            lbl.className = 'fret-label';
            lbl.innerText = labelTexts[f];
            labels.appendChild(lbl);
        }

        const activeLayerCount = Object.values(activeLayers).filter(v => v).length;
        const currentModel = excelModel[currentPosition];

        for (let s = 1; s <= 6; s++) {
            const stringRow = document.createElement('div');
            stringRow.className = 'string';

            for (let f = 0; f < 5; f++) {
                const fretCell = document.createElement('div');
                fretCell.className = `fret fret-${f}`;

                let matchingActiveScales = [];
                for (let type in activeLayers) {
                    if (activeLayers[type]) {
                        const val = currentModel.scales[type][s-1][f];
                        if (val === '〇' || val === '⚪︎' || val == 1) {
                            matchingActiveScales.push(type);
                        }
                    }
                }

                let isChordTone = false;
                let isRoot = false;
                if (selectedChord) {
                    const cVal = currentModel.chords[selectedChord][s-1][f];
                    if (cVal === '〇' || cVal === '◎') {
                        isChordTone = true;
                        if (cVal === '◎') isRoot = true;
                    }
                }

                if (matchingActiveScales.length > 0 || isChordTone) {
                    const noteDiv = document.createElement('div');
                    
                    const baseType = matchingActiveScales.length > 0 ? matchingActiveScales[0] : 'major_scale';
                    noteDiv.className = `note ${baseType}`;
                    noteDiv.style.display = 'flex';

                    if (activeLayerCount > 1 && matchingActiveScales.length === activeLayerCount) {
                        noteDiv.className = 'note scale-overlap';
                    }

                    if (selectedChord && isChordTone) {
                        noteDiv.classList.add('chord-on');
                        noteDiv.innerText = isRoot ? 'R' : '●';
                        if (isRoot) {
                            noteDiv.classList.add('chord-root');
                        }
                    }

                    fretCell.appendChild(noteDiv);
                }

                stringRow.appendChild(fretCell);
            }
            board.appendChild(stringRow);
        }
    }

    function changePosition(posName) {
        currentPosition = posName;
        document.querySelectorAll('.pos-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', `position${idx+1}` === posName);
        });
        buildFretboard();
    }

    function toggleLayer(layerName) {
        activeLayers[layerName] = !activeLayers[layerName];
        document.getElementById(`btn-${layerName}`).classList.toggle('active', activeLayers[layerName]);
        buildFretboard();
    }

    function toggleChord(chordName) {
        const buttons = document.querySelectorAll('.chord-btn');
        if (selectedChord === chordName) {
            selectedChord = null;
            event.target.classList.remove('active');
        } else {
            buttons.forEach(b => b.classList.remove('active'));
            selectedChord = chordName;
            event.target.classList.add('active');
        }
        buildFretboard();
    }

    window.onload = buildFretboard;
</script>
</body>
</html>
