<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR_MNVR / FRETBOARD VISUALIZER</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #ff3e00;
            --border: #e0e0e0;
            --muted: #a0a0a0;
            
            /* 音符の色は維持 */
            --color-major: #3fb950;
            --color-mms: #ff7b72;
            --color-mpenta: #58a6ff;
            --color-minpenta: #f2c744;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--fg); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; padding: 5vw; text-transform: uppercase; }

        header { border-bottom: 2px solid var(--fg); padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 5vw; font-weight: 900; line-height: 0.8; letter-spacing: -0.05em; }
        .system-clock { font-size: 10px; font-weight: 500; transform: rotate(-90deg); transform-origin: bottom right; }

        .container { max-width: 900px; margin: 0 auto; }
        .control-panel { border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; }
        
        .position-grid, .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .pos-btn, .layer-btn { background: #fff; border: 1px solid var(--fg); padding: 12px 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .pos-btn.active, .layer-btn.active { background: var(--fg); color: #fff; }
        
        .chord-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .chord-btn { background: #fff; border: 1px solid var(--fg); padding: 10px 0; cursor: pointer; }
        .chord-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .fretboard-container { border: 1px solid var(--border); padding: 30px 20px; }
        .fretboard { display: flex; flex-direction: column; width: 100%; }
        .string { height: 60px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        .fret { flex: 1; height: 100%; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--border); }
        
        .note { width: 36px; height: 36px; border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: 800; }
        .note.major_scale { border: 2px solid var(--color-major); }
        .note.melodic_minor { border: 2px solid var(--color-mms); }
        .note.major_penta { border: 2px solid var(--color-mpenta); }
        .note.minor_penta { border: 2px solid var(--color-minpenta); }
        .note.chord-on { background: var(--fg) !important; color: #fff !important; }
        .note.chord-root { background: var(--accent) !important; }

        .fret-labels { display: flex; width: 100%; margin-top: 15px; }
        .fret-label { flex: 1; text-align: center; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>
<body>

    <header>
        <h1>FRETBOARD<br>VISUALIZER</h1>
        <div class="system-clock" id="liveClock">INIT...</div>
    </header>

    <div class="container">
        <div class="control-panel">
            <div class="section-title">0. Position</div>
            <div class="position-grid">
                <button id="btn-pos1" class="pos-btn active" onclick="changePosition('position1')">Pos 1</button>
                <button id="btn-pos2" class="pos-btn" onclick="changePosition('position2')">Pos 2</button>
                <button id="btn-pos3" class="pos-btn" onclick="changePosition('position3')">Pos 3</button>
                <button id="btn-pos4" class="pos-btn" onclick="changePosition('position4')">Pos 4</button>
            </div>

            <div class="section-title">1. Layers</div>
            <div class="matrix-grid">
                <button id="btn-major_scale" class="layer-btn active" onclick="toggleLayer('major_scale')">Major</button>
                <button id="btn-melodic_minor" class="layer-btn" onclick="toggleLayer('melodic_minor')">Melodic</button>
                <button id="btn-major_penta" class="layer-btn" onclick="toggleLayer('major_penta')">M.Penta</button>
                <button id="btn-minor_penta" class="layer-btn" onclick="toggleLayer('minor_penta')">m.Penta</button>
            </div>

            <div class="section-title">2. Chord Tones</div>
            <div class="chord-grid">
                <button class="chord-btn" onclick="toggleChord('IM7')">ⅠM7</button>
                <button class="chord-btn" onclick="toggleChord('IIm7')">Ⅱm7</button>
                <button class="chord-btn" onclick="toggleChord('IIIm7')">Ⅲm7</button>
                <button class="chord-btn" onclick="toggleChord('IVM7')">ⅣM7</button>
                <button class="chord-btn" onclick="toggleChord('V7')">Ⅴ7</button>
                <button class="chord-btn" onclick="toggleChord('VIm7')">Ⅵm7</button>
                <button class="chord-btn" onclick="toggleChord('VIIm7b5')">Ⅶm7♭5</button>
            </div>
        </div>

        <div class="fretboard-container">
            <div class="fretboard" id="fretboardGrid"></div>
            <div class="fret-labels" id="fretLabels"></div>
        </div>
    </div>

    let activeLayers = { major_scale: true, melodic_minor: false, major_penta: false, minor_penta: false };
    let selectedChord = null;

                melodic_minor: [['〇', null, '〇', '〇', null], [null, null, '〇', null, '〇'], ['〇', null, '〇', null, '〇'], [null, '〇', '〇', null, '〇'], ['〇', null, '〇', null, '〇'], ['〇', null, '〇', '〇', null]],
                major_penta: [['〇', null, '〇', null, '〇'], [null, null, '〇', null, '・'], [null, '〇', '・', null, '〇'], [null, '・', '〇', null, '〇'], ['・', null, '〇', null, '〇'], ['〇', null, '〇', null, '〇']],
                minor_penta: [['〇', null, '・', '〇', '・'], ['〇', null, '・', '〇', '・'], ['〇', '・', '〇', null, '・'], ['〇', '・', '〇', null, '・'], ['〇', null, '〇', null, '・'], ['〇', null, '・', '〇', '・']]
            },
            chords: { IM7: [['◎', null, '・', null, '〇'], [null, null, '・', null, '〇'], [null, '〇', '・', null, '〇'], [null, '〇', '◎', null, '・'], ['・', null, '〇', null, '・'], ['◎', null, '・', null, '〇']], IIm7: [['〇', null, '◎', null, '・'], [null, null, '〇', null, '・'], [null, '・', '〇', null, null], [null, '・', '〇', null, '◎'], ['〇', null, '・', null, '〇'], ['〇', null, '◎', null, '・']], IIIm7: [['・', null, '〇', null, '◎'], [null, null, '・', null, '〇'], [null, '◎', '・', null, '〇'], [null, '〇', '・', null, '〇'], ['・', null, '〇', null, '・'], ['・', null, '〇', null, '◎']], IVM7: [['〇', null, '・', null, '〇'], [null, null, '〇', null, '・'], [null, '〇', '◎', null, '・'], [null, '・', '〇', null, '・'], ['◎', null, '・', null, '〇'], ['〇', null, '・', null, '〇']], V7: [['・', null, '〇', null, '・'], [null, null, '・', null, '〇'], [null, '・', '〇', null, '◎'], [null, '〇', '・', null, '〇'], ['〇', null, '◎', null, '・'], ['・', null, '〇', null, '・']], VIm7: [['〇', null, '・', null, '〇'], [null, null, '◎', null, '・'], [null, '〇', '・', null, '〇'], [null, '・', '〇', null, '・'], ['・', null, '〇', null, '◎'], ['〇', null, '・', null, '〇']], VIIm7b5: [['・', null, '〇', null, '・'], [null, null, '〇', null, '◎'], [null, '・', '〇', null, '・'], [null, '◎', '・', null, '〇'], ['〇', null, '・', null, '〇'], ['・', null, '〇', null, '・']] }
        },

        },
        position3: {
            scales: {
                major_scale: [[null, '〇', null, '〇', '〇'], [null, '〇', '〇', null, '〇'], ['〇', '〇', null, '〇', null], [null, '〇', null, '〇', null], [null, '〇', null, '〇', '〇'], [null, '〇', null, '〇', '〇']],
                melodic_minor: [[null, '〇', null, '〇', '〇'], ['〇', null, '〇', null, '〇'], ['〇', '〇', null, '〇', null], [null, '〇', null, '〇', null], [null, '〇', '〇', null, '〇'], [null, '〇', null, '〇', '〇']],
                major_penta: [[null, '〇', null, '・', '〇'], [null, '〇', '・', null, '〇'], ['・', '〇', null, '〇', null], [null, '〇', null, '〇', null], [null, '〇', null, '〇', '・'], [null, '〇', null, '・', '〇']],
                minor_penta: [[null, '・', '〇', '・', '〇'], [null, '・', '〇', null, '〇'], ['・', '〇', null, null, '〇'], [null, '〇', null, '・', '〇'], [null, '・', '〇', '・', '〇'], [null, '・', '〇', '・', '〇']]
            },
            chords: { IM7: [[null, '・', null, '〇', '◎'], [null, '〇', '・', null, '〇'], ['〇', '◎', null, '・', null], [null, '〇', null, '・', null], [null, '・', null, '〇', '・'], [null, '・', null, '〇', '◎']], IIm7: [[null, '〇', null, '・', '〇'], [null, '・', '〇', null, '・'], ['・', '〇', null, '◎', null], [null, '・', null, '〇', null], [null, '◎', null, '・', '〇'], [null, '〇', null, '・', '〇']], IIIm7: [[null, '・', null, '〇', '・'], [null, '◎', '・', null, '〇'], ['〇', '・', null, '〇', null], [null, '〇', null, '・', null], [null, '〇', null, '◎', '・'], [null, '・', null, '〇', '・']], IVM7: [[null, '〇', null, '・', '〇'], [null, '〇', '◎', null, '・'], ['・', '〇', null, '・', null], [null, '・', null, '〇', null], [null, '・', null, '〇', '◎'], [null, '〇', null, '・', '〇']], V7: [[null, '・', null, '〇', '・'], [null, '・', '〇', null, '◎'], ['〇', '・', null, '〇', null], [null, '◎', null, '・', null], [null, '〇', null, '・', '〇'], [null, '・', null, '〇', '・']], VIm7: [[null, '◎', null, '・', '〇'], [null, '〇', '・', null, '〇'], ['・', '〇', null, '・', null], [null, '〇', null, '◎', null], [null, '・', null, '〇', '・'], [null, '◎', null, '・', '〇']], VIIm7b5: [[null, '〇', null, '◎', '・'], [null, '・', '〇', null, '・'], ['◎', '・', null, '〇', null], [null, '・', null, '〇', null], [null, '〇', null, '・', '〇'], [null, '〇', null, '◎', '・']] }

            },
            chords: { IM7: [[null, '〇', '・', null, '〇'], [null, '〇', '◎', null, '・'], [null, '〇', null, '・', null], [null, '・', null, '〇', '・'], [null, '〇', null, '〇', '◎'], [null, '〇', '・', null, '〇']], IIm7: [[null, '・', '〇', null, '・'], [null, '・', '〇', null, '◎'], [null, '・', null, '〇', null], [null, '◎', null, '・', '〇'], [null, '〇', null, '・', '〇'], [null, '・', '〇', null, '・']], IIIm7: [[null, '◎', '・', null, '〇'], [null, '〇', '・', null, '〇'], [null, '〇', null, '・', null], [null, '〇', null, '◎', '・'], [null, '・', '〇', '・', '〇'], [null, '◎', '・', null, '〇']], IVM7: [[null, '〇', '◎', null, '・'], [null, '・', '〇', null, '・'], [null, '・', null, '〇', null], [null, '・', null, '〇', '◎'], [null, '〇', null, '・', '〇'], [null, '〇', '◎', null, '・']], V7: [[null, '・', '〇', null, '◎'], [null, '〇', '・', null, '〇'], [null, '◎', null, '・', null], [null, '〇', null, '・', '〇'], [null, '・', '〇', '・', '〇'], [null, '・', '〇', null, '◎']], VIm7: [[null, '〇', '・', null, '〇'], [null, '・', '〇', null, '・'], [null, '〇', null, '◎', null], [null, '・', '〇', '・', '〇'], [null, '◎', null, '・', '〇'], [null, '〇', '・', null, '〇']], VIIm7b5: [[null, '・', '〇', null, '・'], [null, '◎', '・', null, '〇'], [null, '・', null, '〇', null], [null, '〇', null, '・', '〇'], [null, '〇', null, '◎', '・'], [null, '・', '〇', null, '・']] }

    };
    function updateClock() { const n = new Date(); document.getElementById("liveClock").innerText = `${n.getHours()}:${n.getMinutes()}:${n.getSeconds()}`; }
    setInterval(updateClock, 1000);

    function buildFretboard() {
        const board = document.getElementById('fretboardGrid');
        const labels = document.getElementById('fretLabels');
        board.innerHTML = ''; labels.innerHTML = '';
        ["Start", "+1", "+2", "+3", "+4"].forEach(txt => { const lbl = document.createElement('div'); lbl.className = 'fret-label'; lbl.innerText = txt; labels.appendChild(lbl); });
        const currentModel = excelModel[currentPosition];
        for (let s = 1; s <= 6; s++) {
            const stringRow = document.createElement('div'); stringRow.className = 'string';
            for (let f = 0; f < 5; f++) {
                const fretCell = document.createElement('div'); fretCell.className = `fret fret-${f}`;
                let matching = [];
                for (let type in activeLayers) if (activeLayers[type]) { const val = currentModel.scales[type][s-1][f]; if (val === '〇' || val === '⚪︎' || val == 1) matching.push(type); }
                let isChordTone = false, isRoot = false;
                if (selectedChord) { const cVal = currentModel.chords[selectedChord][s-1][f]; if (cVal === '〇' || cVal === '◎') { isChordTone = true; if (cVal === '◎') isRoot = true; } }
                if (matching.length > 0 || isChordTone) {
                    const noteDiv = document.createElement('div'); noteDiv.className = `note ${matching.length > 0 ? matching[0] : 'major_scale'}`;
                    noteDiv.style.display = 'flex';
                    if (selectedChord && isChordTone) { noteDiv.classList.add('chord-on'); noteDiv.innerText = isRoot ? 'R' : '●'; if (isRoot) noteDiv.classList.add('chord-root'); }
                    fretCell.appendChild(noteDiv);
                }
                stringRow.appendChild(fretCell);
            }
            board.appendChild(stringRow);
        }
    }
    function changePosition(p) { currentPosition = p; document.querySelectorAll('.pos-btn').forEach((b,i) => b.classList.toggle('active', `position${i+1}` === p)); buildFretboard(); }
    function toggleLayer(l) { activeLayers[l] = !activeLayers[l]; document.getElementById(`btn-${l}`).classList.toggle('active', activeLayers[l]); buildFretboard(); }
    function toggleChord(c) { selectedChord = (selectedChord === c) ? null : c; document.querySelectorAll('.chord-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(c))); buildFretboard(); }
    window.onload = () => { buildFretboard(); updateClock(); };
</script>
</body>
</html>
