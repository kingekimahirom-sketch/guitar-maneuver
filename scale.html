<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>GTR_MNVR / FRETBOARD VISUALIZER</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #ff3e00;
            --border: #e0e0e0;
            --muted: #a0a0a0;
            
            /* йџіз¬¦гЃ®и‰ІгЃЇз¶­жЊЃ */
            --color-major: #3fb950;
            --color-mms: #ff7b72;
            --color-mpenta: #58a6ff;
            --color-minpenta: #f2c744;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--fg); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; padding: 5vw; text-transform: uppercase; }

        header { border-bottom: 2px solid var(--fg); padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        /* гѓЄгѓіг‚Їз”ЁгЃ®гѓ­г‚ґг‚№г‚їг‚¤гѓ«пј€е…ѓгЃ®h1гЃ®г‚№г‚їг‚¤гѓ«г‚’з¶™ж‰їгЃ—гЃ¤гЃ¤гѓЄгѓіг‚ЇиЈ…йЈѕг‚’е‰Љй™¤пј‰ */
        .logo { 
            font-size: 5vw; 
            font-weight: 900; 
            line-height: 0.8; 
            letter-spacing: -0.05em; 
            text-decoration: none; 
            color: var(--fg);
            transition: opacity 0.2s;
        }
        /* гѓ›гѓђгѓјг‚Ёгѓ•г‚§г‚Їгѓ€ */
        .logo:hover {
            opacity: 0.5;
        }

        .system-clock { font-size: 10px; font-weight: 500; transform: rotate(-90deg); transform-origin: bottom right; }

        .container { max-width: 900px; margin: 0 auto; }
        .control-panel { border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 25px; }
        .section-title { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; }
        
        .position-grid, .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .pos-btn, .layer-btn { background: #fff; border: 1px solid var(--fg); padding: 12px 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .pos-btn.active, .layer-btn.active { background: var(--fg); color: #fff; }
        
        .chord-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .chord-btn { background: #fff; border: 1px solid var(--fg); padding: 10px 0; cursor: pointer; }
        .chord-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .fretboard-container { border: 1px solid var(--border); padding: 30px 20px; }
        .fretboard { display: flex; flex-direction: column; width: 100%; }
        .string { height: 60px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        .fret { flex: 1; height: 100%; display: flex; justify-content: center; align-items: center; border-right: 1px solid var(--border); }
        
        .note { width: 36px; height: 36px; border-radius: 50%; display: none; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: 800; }
        .note.major_scale { border: 2px solid var(--color-major); }
        .note.melodic_minor { border: 2px solid var(--color-mms); }
        .note.major_penta { border: 2px solid var(--color-mpenta); }
        .note.minor_penta { border: 2px solid var(--color-minpenta); }
        .note.chord-on { background: var(--fg) !important; color: #fff !important; }
        .note.chord-root { background: var(--accent) !important; }

        .fret-labels { display: flex; width: 100%; margin-top: 15px; }
        .fret-label { flex: 1; text-align: center; font-size: 0.8rem; color: var(--muted); }
    </style>
</head>

            chords: { IM7: [[null, 'гЂ‡', 'гѓ»', null, 'гЂ‡'], [null, 'гЂ‡', 'в—Ћ', null, 'гѓ»'], [null, 'гЂ‡', null, 'гѓ»', null], [null, 'гѓ»', null, 'гЂ‡', 'гѓ»'], [null, 'гЂ‡', null, 'гЂ‡', 'в—Ћ'], [null, 'гЂ‡', 'гѓ»', null, 'гЂ‡']], IIm7: [[null, 'гѓ»', 'гЂ‡', null, 'гѓ»'], [null, 'гѓ»', 'гЂ‡', null, 'в—Ћ'], [null, 'гѓ»', null, 'гЂ‡', null], [null, 'в—Ћ', null, 'гѓ»', 'гЂ‡'], [null, 'гЂ‡', null, 'гѓ»', 'гЂ‡'], [null, 'гѓ»', 'гЂ‡', null, 'гѓ»']], IIIm7: [[null, 'в—Ћ', 'гѓ»', null, 'гЂ‡'], [null, 'гЂ‡', 'гѓ»', null, 'гЂ‡'], [null, 'гЂ‡', null, 'гѓ»', null], [null, 'гЂ‡', null, 'в—Ћ', 'гѓ»'], [null, 'гѓ»', 'гЂ‡', 'гѓ»', 'гЂ‡'], [null, 'в—Ћ', 'гѓ»', null, 'гЂ‡']], IVM7: [[null, 'гЂ‡', 'в—Ћ', null, 'гѓ»'], [null, 'гѓ»', 'гЂ‡', null, 'гѓ»'], [null, 'гѓ»', null, 'гЂ‡', null], [null, 'гѓ»', null, 'гЂ‡', 'в—Ћ'], [null, 'гЂ‡', null, 'гѓ»', 'гЂ‡'], [null, 'гЂ‡', 'в—Ћ', null, 'гѓ»']], V7: [[null, 'гѓ»', 'гЂ‡', null, 'в—Ћ'], [null, 'гЂ‡', 'гѓ»', null, 'гЂ‡'], [null, 'в—Ћ', null, 'гѓ»', null], [null, 'гЂ‡', null, 'гѓ»', 'гЂ‡'], [null, 'гѓ»', 'гЂ‡', 'гѓ»', 'гЂ‡'], [null, 'гѓ»', 'гЂ‡', null, 'в—Ћ']], VIm7: [[null, 'гЂ‡', 'гѓ»', null, 'гЂ‡'], [null, 'гѓ»', 'гЂ‡', null, 'гѓ»'], [null, 'гЂ‡', null, 'в—Ћ', null], [null, 'гѓ»', 'гЂ‡', 'гѓ»', 'гЂ‡'], [null, 'в—Ћ', null, 'гѓ»', 'гЂ‡'], [null, 'гЂ‡', 'гѓ»', null, 'гЂ‡']], VIIm7b5: [[null, 'гѓ»', 'гЂ‡', null, 'гѓ»'], [null, 'в—Ћ', 'гѓ»', null, 'гЂ‡'], [null, 'гѓ»', null, 'гЂ‡', null], [null, 'гЂ‡', null, 'гѓ»', 'гЂ‡'], [null, 'гЂ‡', null, 'в—Ћ', 'гѓ»'], [null, 'гѓ»', 'гЂ‡', null, 'гѓ»']] }
        }
    };
    function updateClock() { const n = new Date(); document.getElementById("liveClock").innerText = `${n.getHours()}:${n.getMinutes()}:${n.getSeconds()}`; }
    setInterval(updateClock, 1000);

    function buildFretboard() {
        const board = document.getElementById('fretboardGrid');
        const labels = document.getElementById('fretLabels');
        board.innerHTML = ''; labels.innerHTML = '';
        ["Start", "+1", "+2", "+3", "+4"].forEach(txt => { const lbl = document.createElement('div'); lbl.className = 'fret-label'; lbl.innerText = txt; labels.appendChild(lbl); });
        const currentModel = excelModel[currentPosition];
        for (let s = 1; s <= 6; s++) {
            const stringRow = document.createElement('div'); stringRow.className = 'string';
            for (let f = 0; f < 5; f++) {
                const fretCell = document.createElement('div'); fretCell.className = `fret fret-${f}`;
                let matching = [];
                for (let type in activeLayers) if (activeLayers[type]) { const val = currentModel.scales[type][s-1][f]; if (val === 'гЂ‡' || val === 'вљЄпёЋ' || val == 1) matching.push(type); }
                let isChordTone = false, isRoot = false;
                if (selectedChord) { const cVal = currentModel.chords[selectedChord][s-1][f]; if (cVal === 'гЂ‡' || cVal === 'в—Ћ') { isChordTone = true; if (cVal === 'в—Ћ') isRoot = true; } }
                if (matching.length > 0 || isChordTone) {
                    const noteDiv = document.createElement('div'); noteDiv.className = `note ${matching.length > 0 ? matching[0] : 'major_scale'}`;
                    noteDiv.style.display = 'flex';
                    if (selectedChord && isChordTone) { noteDiv.classList.add('chord-on'); noteDiv.innerText = isRoot ? 'R' : 'в—Џ'; if (isRoot) noteDiv.classList.add('chord-root'); }
                    fretCell.appendChild(noteDiv);
                }
                stringRow.appendChild(fretCell);
            }
            board.appendChild(stringRow);
        }
    }
    function changePosition(p) { currentPosition = p; document.querySelectorAll('.pos-btn').forEach((b,i) => b.classList.toggle('active', `position${i+1}` === p)); buildFretboard(); }
    function toggleLayer(l) { activeLayers[l] = !activeLayers[l]; document.getElementById(`btn-${l}`).classList.toggle('active', activeLayers[l]); buildFretboard(); }
    function toggleChord(c) { selectedChord = (selectedChord === c) ? null : c; document.querySelectorAll('.chord-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(c))); buildFretboard(); }
    window.onload = () => { buildFretboard(); updateClock(); };
</script>
