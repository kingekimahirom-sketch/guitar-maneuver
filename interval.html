<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR_MNVR / INTERVAL</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vw;
            overflow: hidden;
            text-transform: uppercase;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* リンクとして機能するようにスタイルを調整 */
        .logo {
            font-size: 5vw;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 0.9;
            text-decoration: none;
            color: var(--fg);
            transition: opacity 0.2s;
        }
        .logo:hover {
            opacity: 0.5; /* ホバー時にメニューに戻る感を演出 */
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .control-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            border-bottom: 2px solid var(--fg);
            padding-bottom: 15px;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .current-key-label {
            font-size: 14px;
            font-weight: bold;
            min-width: 200px;
            text-align: right;
            letter-spacing: 0.05em;
            font-family: monospace;
            color: #666;
        }
        .current-key-label span {
            color: var(--fg);
            font-weight: 900;
        }

        .pure-slider {
            -webkit-appearance: none;
            width: 180px;
            height: 2px;
            background: #ddd;
            outline: none;
        }
        .pure-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--fg);
            cursor: pointer;
            border-radius: 0;
            transition: transform 0.1s;
        }
        .pure-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .staff-container {
            position: relative;
            width: 100%;
            height: 200px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .staff-lines {
            display: flex;
            flex-direction: column;
            gap: 18px; 
            position: relative;
        }
        .staff-line {
            height: 2px;
            background: var(--fg);
            width: 100%;
        }

        .key-signature-display {
            position: absolute;
            left: 20px;
            top: 0;
            height: 100%;
            width: 100%;
            pointer-events: none;
        }
        
        .sig-symbol {
            position: absolute;
            font-family: serif;
            font-size: 46px;
            line-height: 1;
            transform: translate(-50%, -68%); 
        }

        .sig-symbol.is-sharp {
            font-weight: 300;
            transform: translate(-50%, -68%) scale(0.8, 1);
        }

        .note {
            position: absolute;
            width: 26px;
            height: 19px;
            background: var(--fg);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-20deg);
            left: 55%;
            transition: top 0.08s ease-out;
            pointer-events: none;
        }

        .ledger-line {
            position: absolute;
            height: 2px;
            background: var(--fg);
            width: 40px;
            left: 55%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }

        @media (max-width: 768px) {
            .logo { font-size: 10vw; }
            .control-panel { flex-direction: column; gap: 10px; align-items: center; }
            .slider-wrapper { width: 100%; justify-content: space-between; }
            .current-key-label { text-align: center; min-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">INTERVAL</a>
    </header>

    <main>
        <div class="app-container">
            <div class="control-panel">
                <div class="slider-wrapper">
                    <input type="range" min="-6" max="6" value="0" class="pure-slider" id="keySlider">
                    <div class="current-key-label" id="keyLabel">KEY: <span>C / AM</span></div>
                </div>
            </div>

            <div class="staff-container" id="staff">
                <div class="staff-lines">
                    <div class="staff-line"></div>
                    <div class="staff-line"></div>
                    <div class="staff-line"></div>
                    <div class="staff-line"></div>
                    <div class="staff-line"></div>
                    
                    <div class="key-signature-display" id="keySigDisplay"></div>
                    <div class="ledger-line" id="ledgerLine"></div>
                </div>
                <div class="note" id="note" style="top: 100px;"></div>
            </div>
        </div>
    </main>

    <script>
        const staff = document.getElementById('staff');
        const note = document.getElementById('note');
        const ledgerLine = document.getElementById('ledgerLine');
        const keySigDisplay = document.getElementById('keySigDisplay');
        const slider = document.getElementById('keySlider');
        const label = document.getElementById('keyLabel');

        const step = 10; 
        const centerY = 100; 

        const sharpPositions = [-4, -1, -5, -2, 1, -3]; 
        const flatPositions = [0, -3, 1, -2, 2, -1];

        const keyMap = {
            "-6": { name: "G♭ / E♭M", type: "flat", count: 6 },
            "-5": { name: "D♭ / B♭M", type: "flat", count: 5 },
            "-4": { name: "A♭ / FM",  type: "flat", count: 4 },
            "-3": { name: "E♭ / CM",  type: "flat", count: 3 },
            "-2": { name: "B♭ / GM",  type: "flat", count: 2 },
            "-1": { name: "F / DM",   type: "flat", count: 1 },
             "0": { name: "C / AM",   type: "none", count: 0 },
             "1": { name: "G / EM",   type: "sharp", count: 1 },
             "2": { name: "D / BM",   type: "sharp", count: 2 },
             "3": { name: "A / F♯M",  type: "sharp", count: 3 },
             "4": { name: "E / C♯M",  type: "sharp", count: 4 },
             "5": { name: "B / G♯M",  type: "sharp", count: 5 },
             "6": { name: "F♯ / D♯M", type: "sharp", count: 6 }
        };

        staff.addEventListener('click', (e) => {
            const rect = staff.getBoundingClientRect();
            const clickY = e.clientY - rect.top;
            
            const distanceFromCenter = clickY - centerY;
            const stepIndex = Math.round(distanceFromCenter / step);
            const clampedStep = Math.max(-6, Math.min(6, stepIndex));
            
            const finalY = centerY + (clampedStep * step);
            note.style.top = `${finalY}px`;

            if (clampedStep === 5) {
                ledgerLine.style.display = 'block';
                ledgerLine.style.top = `${centerY + (5 * step)}px`;
            } else {
                ledgerLine.style.display = 'none';
            }
        });

        slider.addEventListener('input', () => {
            const config = keyMap[slider.value];
            label.innerHTML = `KEY: <span>${config.name}</span>`;
            renderKeySignature(config.type, config.count);
        });

        function renderKeySignature(type, count) {
            keySigDisplay.innerHTML = '';
            if (type === 'none') return;

            const isSharp = (type === 'sharp');
            const symbol = isSharp ? '♯' : '♭';
            const positions = isSharp ? sharpPositions : flatPositions;
            
            const offset = isSharp ? -50 : -55;

            for (let i = 0; i < count; i++) {
                const el = document.createElement('span');
                el.className = 'sig-symbol' + (isSharp ? ' is-sharp' : '');
                el.innerText = symbol;
                
                el.style.left = `${i * 16}px`;
                el.style.top = `${(centerY + (positions[i] * step)) + offset}px`;
                
                keySigDisplay.appendChild(el);
            }
        }
    </script>
</body>
</html>
