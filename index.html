<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR_MNVR / CONTEMPORARY</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #ff3e00; /* 鮮烈なオレンジ */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 5vw;
            text-transform: uppercase;
        }

        /* ヘッダー：情報の断片化 */
        header { display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { font-size: 8vw; font-weight: 900; line-height: 0.8; letter-spacing: -0.05em; }
        .system-clock { font-size: 10px; font-weight: 500; transform: rotate(-90deg); transform-origin: bottom right; }

        /* メインターゲット：空間を大胆に使う */
        main { display: flex; flex-direction: column; justify-content: center; }
        .target-title { font-size: 6vw; font-weight: 200; border-bottom: 2px solid var(--fg); padding-bottom: 20px; }
        .target-meta { font-size: 2vw; margin-top: 10px; color: #666; }

        /* メニュー：反復と配置の美学 */
        .menu-list { display: flex; flex-direction: column; gap: 40px; margin-top: 100px; }
        .menu-item {
            text-decoration: none;
            color: var(--fg);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .menu-item:hover { color: var(--accent); }
        .menu-num { font-size: 12px; font-weight: bold; }
        .menu-title { font-size: 3vw; font-weight: 700; }

        @media (max-width: 768px) {
            h1 { font-size: 15vw; }
            .target-title { font-size: 10vw; }
            .menu-title { font-size: 8vw; }
        }
    </style>
</head>
<body>

    <header>
        <h1>GTR<br>MNVR</h1>
        <div class="system-clock" id="liveClock">INIT...</div>
    </header>

    <main>
        <div id="dailySong" class="target-title">LOADING...</div>
        <div id="dailyMeta" class="target-meta">---</div>
    </main>

    <div class="menu-list">
        <a href="navigator.html" class="menu-item"><span class="menu-num">01</span><span class="menu-title">PROGRESSION</span></a>
        <a href="scale.html" class="menu-item"><span class="menu-num">02</span><span class="menu-title">SCALE</span></a>
        <a href="licks.html" class="menu-item"><span class="menu-num">03</span><span class="menu-title">TACTICAL</span></a>
    </div>

    <script>
        const realBookStandards = [
            { title: "Just Friends", source: "BIBLE 01", key: "G MAJOR" },
            { title: "Someday My Prince Will Come", source: "BIBLE 01", key: "Bb MAJOR" },
            { title: "All The Things You Are", source: "BIBLE 01", key: "Ab MAJOR" },
            { title: "Autumn Leaves", source: "BIBLE 01", key: "G MINOR" },
            { title: "Stella by Starlight", source: "BIBLE 01", key: "Bb MAJOR" },
            { title: "Fly Me to the Moon", source: "BIBLE 01", key: "C MINOR" },
            { title: "Confirmation", source: "BIBLE 01", key: "F MAJOR" },
            { title: "Wave", source: "BIBLE 01", key: "D MAJOR" },
            { title: "On Green Dolphin Street", source: "BIBLE 02", key: "C MAJOR" },
            { title: "Beautiful Love", source: "BIBLE 02", key: "D MINOR" },
            { title: "Alice In Wonderland", source: "BIBLE 02", key: "G MAJOR" },
            { title: "Black Orpheus", source: "BIBLE 01", key: "A MINOR" }
        ];

        function updateClock() {
            const n = new Date();
            document.getElementById("liveClock").innerText = `${n.getHours()}:${n.getMinutes()}:${n.getSeconds()}`;
        }
        setInterval(updateClock, 1000);

        window.onload = () => {
            updateClock();
            const seed = new Date().getDate();
            const target = realBookStandards[seed % realBookStandards.length];
            document.getElementById("dailySong").innerText = target.title;
            document.getElementById("dailyMeta").innerText = `${target.source} / KEY: ${target.key}`;
        };
    </script>
</body>
</html>
