<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR_MNVR / PROGRESSION</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --accent: #ff3e00;
            --border: #e5e5e5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            padding: 40px 10%;
            line-height: 1.5;
        }

        /* ヘッダー */
        header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 80px; border-bottom: 1px solid var(--text); padding-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
        .nav-link { font-size: 14px; font-weight: 600; text-decoration: none; color: var(--text); border-bottom: 1px solid var(--text); }

        /* コントロール */
        .tab-group { display: flex; gap: 40px; margin-bottom: 60px; }
        .tab-btn { background: none; border: none; font-size: 16px; font-weight: 600; color: #aaa; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--text); }

        /* レーダー：コードの流れを横並びで強調 */
        .prog-title { font-size: 32px; font-weight: 800; margin-bottom: 40px; }
        .chord-chain { display: flex; gap: 20px; margin-bottom: 60px; }
        .chord-box { flex: 1; padding: 20px 10px; border: 1px solid var(--border); transition: 0.3s; }
        .chord-box:hover { border-color: var(--accent); }
        .chord-name { font-size: 24px; font-weight: 700; }
        .chord-deg { font-size: 12px; color: #888; margin-top: 5px; text-transform: uppercase; }

        /* 解説 */
        .briefing { max-width: 600px; }
        .briefing h4 { font-size: 12px; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 10px; }
        .briefing p { font-size: 18px; line-height: 1.7; }

        @media (max-width: 768px) {
            body { padding: 30px 20px; }
            .chord-chain { flex-direction: column; }
            .prog-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PROGRESSION.</div>
        <a href="index.html" class="nav-link">BACK TO MENU</a>
    </header>

    <div class="tab-group">
        <button class="tab-btn active" onclick="switchProgression('major', event)">II-V-I-VI</button>
        <button class="tab-btn" onclick="switchProgression('sdm', event)">SUB-DOM MINOR</button>
        <button class="tab-btn" onclick="switchProgression('backdoor', event)">BACKDOOR</button>
    </div>

    <main>
        <div id="progTitle" class="prog-title">LOADING...</div>
        <div class="chord-chain" id="chordChain"></div>
        <div class="briefing">
            <h4>TACTICAL BRIEFING</h4>
            <p id="analysisText">LOADING...</p>
        </div>
    </main>

    <script>
        const progressions = {
            major: {
                title: "Major II-V-I-VI",
                chords: [{name:"IIm7",deg:"2nd"},{name:"V7",deg:"5th"},{name:"IM7",deg:"1st"},{name:"VI7",deg:"6th"}],
                briefing: "ジャズの標準装備。V7の3度と7度が、IM7のルートと3度へ滑り込むガイドトーンを指板上でなぞる感覚を磨いてください。"
            },
            sdm: {
                title: "Subdominant Minor",
                chords: [{name:"IVM7",deg:"4th"},{name:"IVm7",deg:"4m"},{name:"IIIm7",deg:"3rd"},{name:"VI7",deg:"6th"}],
                briefing: "メジャーからマイナーへの『半音降下』が鍵。切ない響きを指板のどこで鳴らすか、ポジションの選択がソロの命運を分けます。"
            },
            backdoor: {
                title: "Backdoor Dominant",
                chords: [{name:"IIm7",deg:"2nd"},{name:"♭VII7",deg:"♭7th"},{name:"IM7",deg:"1st"},{name:"IM7",deg:"1st"}],
                briefing: "裏口からの奇襲。♭VII7が持つ独特の浮遊感を活かし、無理にドミナントで解決せず、優しくトニックへ着地させるモダンなアプローチ。"
            }
        };

        function switchProgression(type, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            const prog = progressions[type];
            document.getElementById('progTitle').innerText = prog.title;
            document.getElementById('analysisText').innerText = prog.briefing;
            document.getElementById('chordChain').innerHTML = prog.chords.map(c => `
                <div class="chord-box">
                    <div class="chord-name">${c.name}</div>
                    <div class="chord-deg">${c.deg}</div>
                </div>
            `).join('');
        }
        switchProgression('major');
    </script>
</body>
</html>
