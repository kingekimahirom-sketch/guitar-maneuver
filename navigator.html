<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR_MNVR / PROGRESSION</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --accent: #ff3e00; /* 鮮烈なオレンジ */
            --border: #000000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vw;
            text-transform: uppercase;
        }

        /* ヘッダー：他ページと完全に同期 */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            width: 100%;
        }
        
        /* 1つ前のページと同じく、ロゴ自体をメニューへの戻りリンクに */
        .logo { 
            font-size: 5vw; 
            font-weight: 900; 
            line-height: 0.9; 
            letter-spacing: -0.05em; 
            text-decoration: none;
            color: var(--fg);
            transition: opacity 0.2s;
        }
        .logo:hover { 
            opacity: 0.5; 
        }

        /* メインコンテンツ */
        main { 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 40px;
        }

        /* コントロール（タブ） */
        .tab-group { 
            display: flex; 
            gap: 30px; 
            margin-bottom: 40px; 
            border-bottom: 2px solid var(--fg);
            padding-bottom: 15px;
        }
        .tab-btn { 
            background: none; 
            border: none; 
            font-size: 14px; 
            font-weight: 900; 
            color: #666; 
            cursor: pointer; 
            letter-spacing: 0.05em;
            transition: color 0.2s; 
            text-transform: uppercase;
        }
        .tab-btn:hover { color: var(--fg); }
        .tab-btn.active { color: var(--accent); }

        /* タイトル */
        .prog-title { 
            font-size: 4vw; 
            font-weight: 200; 
            margin-bottom: 30px; 
            letter-spacing: -0.02em;
        }

        /* コードチェーン */
        .chord-chain { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 40px; 
            width: 100%;
        }
        .chord-box { 
            flex: 1; 
            padding: 20px; 
            border: 1px solid #ddd; 
            transition: border-color 0.2s, background-color 0.2s; 
        }
        .chord-box:hover { 
            border-color: var(--fg); 
            background: #fafafa;
        }
        .chord-name { 
            font-size: 2.5vw; 
            font-weight: 700; 
            letter-spacing: -0.03em;
        }
        .chord-deg { 
            font-size: 11px; 
            color: #666; 
            margin-top: 5px; 
            font-family: monospace;
        }

        /* 解説（タクティカル・ブリーフィング） */
        .briefing { 
            max-width: 800px; 
        }
        .briefing h4 { 
            font-size: 12px; 
            font-weight: 900;
            letter-spacing: 0.1em; 
            color: var(--accent); 
            margin-bottom: 10px; 
        }
        .briefing p { 
            font-size: 16px; 
            font-weight: 500;
            line-height: 1.6; 
            color: #333;
        }

        @media (max-width: 768px) {
            .logo { font-size: 10vw; }
            .tab-group { gap: 15px; overflow-x: auto; white-space: nowrap; }
            .tab-btn { font-size: 12px; }
            .prog-title { font-size: 8vw; }
            .chord-chain { flex-direction: column; gap: 10px; }
            .chord-name { font-size: 6vw; }
            .briefing p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">GTR<br>MNVR</a>
    </header>

    <main>
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchProgression('major', event)">II-V-I-VI</button>
            <button class="tab-btn" onclick="switchProgression('sdm', event)">SUB-DOM MINOR</button>
            <button class="tab-btn" onclick="switchProgression('backdoor', event)">BACKDOOR</button>
        </div>

        <div id="progTitle" class="prog-title">LOADING...</div>
        <div class="chord-chain" id="chordChain"></div>
        
        <div class="briefing">
            <h4>TACTICAL BRIEFING</h4>
            <p id="analysisText">LOADING...</p>
        </div>
    </main>

    <script>
        const progressions = {
            major: {
                title: "Major II-V-I-VI",
                chords: [{name:"IIm7",deg:"2nd"},{name:"V7",deg:"5th"},{name:"IM7",deg:"1st"},{name:"VI7",deg:"6th"}],
                briefing: "ジャズの標準装備。V7の3度と7度が、IM7のルートと3度へ滑り込むガイドトーンを指板上でなぞる感覚を磨いてください。"
            },
            sdm: {
                title: "Subdominant Minor",
                chords: [{name:"IVM7",deg:"4th"},{name:"IVm7",deg:"4m"},{name:"IIIm7",deg:"3rd"},{name:"VI7",deg:"6th"}],
                briefing: "メジャーからマイナーへの『半音降下』が鍵。切ない響きを指板のどこで鳴らすか、ポジションの選択がソロの命運を分けます。"
            },
            backdoor: {
                title: "Backdoor Dominant",
                chords: [{name:"IIm7",deg:"2nd"},{name:"♭VII7",deg:"♭7th"},{name:"IM7",deg:"1st"},{name:"IM7",deg:"1st"}],
                briefing: "裏口からの奇襲。♭VII7が持つ独特の浮遊感を活かし、無理にドミナントで解決せず、優しくトニックへ着地させるモダンなアプローチ。"
            }
        };

        function switchProgression(type, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            const prog = progressions[type];
            document.getElementById('progTitle').innerText = prog.title;
            document.getElementById('analysisText').innerText = prog.briefing;
            document.getElementById('chordChain').innerHTML = prog.chords.map(c => `
                <div class="chord-box">
                    <div class="chord-name">${c.name}</div>
                    <div class="chord-deg">${c.deg}</div>
                </div>
            `).join('');
        }
        
        // 初期化
        switchProgression('major');
    </script>
</body>
</html>
